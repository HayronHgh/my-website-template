<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pixel software engineer avatar</title>
  <desc id="desc">A pixel-style software engineer sitting at a desk with a laptop, cactus, mug, and neon glow.</desc>

  <!-- background panel -->
  <rect width="320" height="320" rx="18" fill="#061024"/>
  <rect x="8" y="8" width="304" height="304" rx="14" fill="url(#panelGlow)" stroke="#2DD4BF" stroke-opacity="0.22" stroke-width="2"/>

  <!-- subtle grid -->
  <g opacity="0.16">
    <path d="M40 16V304M80 16V304M120 16V304M160 16V304M200 16V304M240 16V304M280 16V304" stroke="#60A5FA" stroke-width="1"/>
    <path d="M16 40H304M16 80H304M16 120H304M16 160H304M16 200H304M16 240H304M16 280H304" stroke="#60A5FA" stroke-width="1"/>
  </g>

  <!-- window / room -->
  <rect x="58" y="34" width="204" height="112" rx="8" fill="#07162E" stroke="#33517A" stroke-width="3"/>
  <rect x="72" y="48" width="44" height="84" fill="#0B1C38" stroke="#203B63" stroke-width="3"/>
  <rect x="138" y="48" width="44" height="84" fill="#0B1C38" stroke="#203B63" stroke-width="3"/>
  <rect x="204" y="48" width="44" height="84" fill="#0B1C38" stroke="#203B63" stroke-width="3"/>
  <g fill="#F8FAFC" opacity="0.85">
    <rect x="86" y="64" width="4" height="4"/>
    <rect x="154" y="82" width="4" height="4"/>
    <rect x="224" y="60" width="4" height="4"/>
    <rect x="234" y="104" width="3" height="3"/>
    <rect x="94" y="112" width="3" height="3"/>
  </g>

  <!-- side shelf -->
  <rect x="232" y="86" width="36" height="10" fill="#3B2B3D"/>
  <rect x="240" y="66" width="20" height="20" fill="#1D2A44" stroke="#516487" stroke-width="3"/>
  <path d="M246 79H254" stroke="#84CC16" stroke-width="3"/>

  <!-- desk glow -->
  <ellipse cx="160" cy="257" rx="118" ry="26" fill="#22D3EE" opacity="0.12"/>
  <rect x="44" y="232" width="232" height="20" fill="#42291E" stroke="#1E1410" stroke-width="3"/>
  <rect x="52" y="252" width="216" height="14" fill="#271A17"/>
  <rect x="68" y="266" width="18" height="30" fill="#171923"/>
  <rect x="234" y="266" width="18" height="30" fill="#171923"/>

  <!-- cactus -->
  <g>
    <rect x="42" y="202" width="18" height="34" rx="3" fill="#315D3B" stroke="#142B1B" stroke-width="3"/>
    <rect x="34" y="214" width="10" height="20" rx="3" fill="#2F7042" stroke="#142B1B" stroke-width="3"/>
    <rect x="58" y="190" width="10" height="30" rx="3" fill="#2F7042" stroke="#142B1B" stroke-width="3"/>
    <rect x="36" y="234" width="30" height="12" fill="#5C4033" stroke="#241713" stroke-width="3"/>
  </g>

  <!-- mug -->
  <g>
    <rect x="76" y="212" width="24" height="24" rx="3" fill="#D6E6FF" stroke="#24324A" stroke-width="3"/>
    <path d="M100 218H110V230H100" stroke="#D6E6FF" stroke-width="4"/>
    <rect x="82" y="216" width="6" height="4" fill="#67E8F9"/>
  </g>

  <!-- body / hoodie -->
  <g>
    <path d="M110 182H210L224 236H96L110 182Z" fill="#172554" stroke="#07111F" stroke-width="5"/>
    <path d="M132 188H188L204 236H116L132 188Z" fill="#1E3A8A" opacity="0.85"/>
    <rect x="106" y="202" width="26" height="34" fill="#111827"/>
    <rect x="188" y="202" width="26" height="34" fill="#111827"/>
    <path d="M148 188L160 208L172 188" stroke="#60A5FA" stroke-width="4" stroke-linecap="square"/>
  </g>

  <!-- neck -->
  <rect x="142" y="156" width="36" height="34" fill="#C98258" stroke="#3A1E16" stroke-width="4"/>

  <!-- head -->
  <g>
    <rect x="112" y="92" width="96" height="76" rx="8" fill="#D69568" stroke="#2A1511" stroke-width="5"/>
    <rect x="124" y="124" width="12" height="12" fill="#111827"/>
    <rect x="184" y="124" width="12" height="12" fill="#111827"/>
    <rect x="150" y="146" width="20" height="5" fill="#8A4D38"/>
    <rect x="108" y="118" width="12" height="30" fill="#C98258" stroke="#2A1511" stroke-width="4"/>
    <rect x="200" y="118" width="12" height="30" fill="#C98258" stroke="#2A1511" stroke-width="4"/>
  </g>

  <!-- hair -->
  <g fill="#101827" stroke="#050812" stroke-width="4">
    <rect x="104" y="80" width="104" height="30" rx="8"/>
    <rect x="112" y="72" width="24" height="28" rx="5"/>
    <rect x="134" y="68" width="28" height="34" rx="5"/>
    <rect x="158" y="70" width="28" height="32" rx="5"/>
    <rect x="184" y="78" width="26" height="34" rx="5"/>
    <rect x="104" y="102" width="20" height="34" rx="4"/>
    <rect x="196" y="102" width="20" height="34" rx="4"/>
  </g>

  <!-- laptop -->
  <g>
    <rect x="116" y="204" width="116" height="58" rx="4" fill="#1F2937" stroke="#0B1220" stroke-width="5"/>
    <rect x="124" y="212" width="100" height="42" fill="#111827"/>
    <path d="M154 232L166 220M166 220L178 232" stroke="#84CC16" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M148 220L140 228L148 236M184 220L192 228L184 236" stroke="#22D3EE" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
    <rect x="100" y="262" width="148" height="12" rx="2" fill="#111827" stroke="#0B1220" stroke-width="4"/>
  </g>

  <!-- pixel highlights -->
  <g opacity="0.85">
    <rect x="42" y="42" width="8" height="8" fill="#A855F7"/>
    <rect x="54" y="42" width="8" height="8" fill="#22D3EE"/>
    <rect x="66" y="42" width="8" height="8" fill="#F59E0B"/>
    <rect x="250" y="246" width="6" height="6" fill="#84CC16"/>
    <rect x="260" y="236" width="5" height="5" fill="#22D3EE"/>
  </g>

  <defs>
    <radialGradient id="panelGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 222) rotate(90) scale(172 170)">
      <stop stop-color="#0C1B38"/>
      <stop offset="0.55" stop-color="#071226"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
  </defs>
</svg>
